basePath: /api/v1
consumes:
- application/json
definitions:
  feed.TimelineCursorPage:
    properties:
      has_more:
        type: boolean
      items:
        items:
          $ref: '#/definitions/feed.postResponse'
        type: array
      next_cursor:
        type: string
    type: object
  feed.postLinkPreview:
    properties:
      description:
        type: string
      image_url:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
  feed.postMediaResponse:
    properties:
      id:
        type: string
      media_type:
        type: string
      media_url:
        type: string
      position:
        type: integer
    type: object
  feed.postResponse:
    properties:
      author_avatar_url:
        type: string
      author_display_name:
        type: string
      author_id:
        type: string
      author_username:
        type: string
      author_verified:
        type: boolean
      body:
        type: string
      created_at:
        type: string
      hashtags:
        items:
          type: string
        type: array
      id:
        type: string
      like_count:
        type: integer
      liked_by_me:
        type: boolean
      link_preview:
        $ref: '#/definitions/feed.postLinkPreview'
      media:
        items:
          $ref: '#/definitions/feed.postMediaResponse'
        type: array
      parent_id:
        type: string
      reply_count:
        type: integer
      repost_count:
        type: integer
      repost_of_id:
        type: string
      reposted_by_me:
        type: boolean
    type: object
  media.ConfirmUploadRequest:
    properties:
      size:
        type: integer
    type: object
  media.UploadResponse:
    properties:
      content_type:
        type: string
      created_at:
        type: string
      file_key:
        type: string
      id:
        type: string
      size:
        type: integer
      status:
        type: string
      url:
        type: string
    type: object
  media.UploadURLRequest:
    properties:
      content_type:
        type: string
      filename:
        type: string
    type: object
  media.UploadURLResponse:
    properties:
      file_key:
        type: string
      id:
        type: string
      upload_url:
        type: string
    type: object
  posts.CreatePostRequest:
    properties:
      body:
        type: string
      media_ids:
        items:
          type: string
        type: array
      parent_id:
        type: string
      repost_of_id:
        type: string
    type: object
  posts.LikeResponse:
    properties:
      like_count:
        type: integer
      liked_by_me:
        type: boolean
      post_id:
        type: string
    type: object
  posts.LinkPreviewResponse:
    properties:
      description:
        type: string
      image_url:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
  posts.MediaResponse:
    properties:
      id:
        type: string
      media_type:
        type: string
      media_url:
        type: string
      position:
        type: integer
    type: object
  posts.PostCursorPage:
    properties:
      has_more:
        type: boolean
      items:
        items:
          $ref: '#/definitions/posts.PostResponse'
        type: array
      next_cursor:
        type: string
    type: object
  posts.PostResponse:
    properties:
      author_avatar_url:
        type: string
      author_display_name:
        type: string
      author_id:
        type: string
      author_username:
        type: string
      author_verified:
        type: boolean
      body:
        type: string
      created_at:
        type: string
      hashtags:
        items:
          type: string
        type: array
      id:
        type: string
      like_count:
        type: integer
      liked_by_me:
        type: boolean
      link_preview:
        $ref: '#/definitions/posts.LinkPreviewResponse'
      media:
        items:
          $ref: '#/definitions/posts.MediaResponse'
        type: array
      parent_id:
        type: string
      reply_count:
        type: integer
      repost_count:
        type: integer
      repost_of_id:
        type: string
      reposted_by_me:
        type: boolean
    type: object
  posts.RepostResponse:
    properties:
      post_id:
        type: string
      repost_count:
        type: integer
      reposted_by_me:
        type: boolean
    type: object
  types.AppError:
    properties:
      detail:
        type: string
      message:
        type: string
    type: object
  users.AuthResponse:
    properties:
      access_token:
        type: string
      user:
        $ref: '#/definitions/users.ProfileResponse'
    type: object
  users.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  users.ProfileCursorPage:
    properties:
      has_more:
        type: boolean
      items:
        items:
          $ref: '#/definitions/users.ProfileResponse'
        type: array
      next_cursor:
        type: string
    type: object
  users.ProfileResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      follower_count:
        type: integer
      following_count:
        type: integer
      id:
        type: string
      is_following:
        type: boolean
      username:
        type: string
      verified:
        type: boolean
    type: object
  users.RefreshResponse:
    properties:
      access_token:
        type: string
    type: object
  users.RegisterRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  users.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      display_name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Chronological microblogging platform — pre-2022 Twitter clone.
  title: Soapbox API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password. Returns an access token and
        sets a refresh token cookie.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/users.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.AuthResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/types.AppError'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidate all sessions for the authenticated user and clear the
        refresh token cookie.
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Log out
      tags:
      - auth
  /auth/refresh:
    post:
      description: Exchange a valid refresh token (from cookie) for a new access token
        and rotated refresh token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.RefreshResponse'
        "401":
          description: Missing or invalid refresh token
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create an account with email, password, and username. Returns an
        access token and sets a refresh token cookie.
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/users.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/users.AuthResponse'
        "409":
          description: Email or username already taken
          schema:
            $ref: '#/definitions/types.AppError'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      summary: Register a new user
      tags:
      - auth
  /feed:
    get:
      description: Returns the authenticated user's chronological home timeline. Shows
        posts from followed users and the user's own posts.
      parameters:
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/feed.TimelineCursorPage'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Get timeline
      tags:
      - feed
  /media/{id}/confirm:
    post:
      consumes:
      - application/json
      description: Marks a pending upload as ready. Call this after successfully uploading
        the file to the presigned URL.
      parameters:
      - description: Upload ID
        in: path
        name: id
        required: true
        type: string
      - description: Upload size
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/media.ConfirmUploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/media.UploadResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.AppError'
        "403":
          description: Not the upload owner
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: Upload not found
          schema:
            $ref: '#/definitions/types.AppError'
        "409":
          description: Already confirmed
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Confirm an upload
      tags:
      - media
  /media/upload-url:
    post:
      consumes:
      - application/json
      description: Returns a presigned S3 URL for direct file upload. The client uploads
        the file directly to S3 using this URL, then confirms the upload.
      parameters:
      - description: Upload details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/media.UploadURLRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/media.UploadURLResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.AppError'
        "422":
          description: Unsupported content type
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Request a presigned upload URL
      tags:
      - media
  /posts:
    post:
      consumes:
      - application/json
      description: Create a new post with text and optional image attachments. Supports
        replies (parent_id) and reposts (repost_of_id). Automatically extracts hashtags
        and fetches link previews.
      parameters:
      - description: Post content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/posts.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/posts.PostResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Create a post
      tags:
      - posts
  /posts/{id}:
    delete:
      description: Delete a post. Only the post author can delete their own post.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "403":
          description: Not the post author
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: Post not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Delete a post
      tags:
      - posts
    get:
      description: Retrieve a post by ID. If authenticated, includes whether the viewer
        has liked or reposted this post.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.PostResponse'
        "404":
          description: Post not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Get a post
      tags:
      - posts
  /posts/{id}/like:
    delete:
      description: Remove a like from a post. Returns the updated like count.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.LikeResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: Like not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Unlike a post
      tags:
      - posts
    post:
      description: Add a like to a post. Returns the updated like count.
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.LikeResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: Post not found
          schema:
            $ref: '#/definitions/types.AppError'
        "409":
          description: Already liked
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Like a post
      tags:
      - posts
  /posts/{id}/replies:
    get:
      description: Retrieve replies to a post, cursor-paginated in chronological order.
      parameters:
      - description: Parent post ID
        in: path
        name: id
        required: true
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.PostCursorPage'
        "404":
          description: Post not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Get replies
      tags:
      - posts
  /posts/{id}/repost:
    delete:
      description: Remove a repost of a post. Returns the updated repost count.
      parameters:
      - description: Original post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.RepostResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: Repost not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Undo repost
      tags:
      - posts
    post:
      description: Repost an existing post. Returns the updated repost count.
      parameters:
      - description: Post ID to repost
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.RepostResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: Post not found
          schema:
            $ref: '#/definitions/types.AppError'
        "409":
          description: Already reposted
          schema:
            $ref: '#/definitions/types.AppError'
        "422":
          description: Cannot repost a repost
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Repost a post
      tags:
      - posts
  /posts/search:
    get:
      description: Full-text search over post body content, cursor-paginated.
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.PostCursorPage'
        "422":
          description: Missing query parameter
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      summary: Search posts
      tags:
      - posts
  /users/{username}:
    get:
      description: Retrieve a user's profile by username. If authenticated, includes
        whether the viewer follows this user.
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.ProfileResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - users
  /users/{username}/follow:
    delete:
      description: Remove a follow relationship with the user identified by username.
        Requires authentication.
      parameters:
      - description: Username to unfollow
        in: path
        name: username
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Unfollow a user
      tags:
      - users
    post:
      description: Follow the user identified by username. Requires authentication.
      parameters:
      - description: Username to follow
        in: path
        name: username
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/types.AppError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/types.AppError'
        "409":
          description: Already following
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Follow a user
      tags:
      - users
  /users/{username}/followers:
    get:
      description: Retrieve a cursor-paginated list of users who follow the given
        username.
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.ProfileCursorPage'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      summary: List followers
      tags:
      - users
  /users/{username}/following:
    get:
      description: Retrieve a cursor-paginated list of users that the given username
        follows.
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.ProfileCursorPage'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      summary: List following
      tags:
      - users
  /users/{username}/posts:
    get:
      description: Retrieve root posts by a user, cursor-paginated in reverse chronological
        order. If authenticated, includes liked/reposted status.
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/posts.PostCursorPage'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/types.AppError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/types.AppError'
      security:
      - BearerAuth: []
      summary: Get user posts
      tags:
      - posts
  /users/me:
    put:
      consumes:
      - application/json
      description: Update display name, bio, or avatar URL for the authenticated user.
      parameters:
      - description: Profile fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/users.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
