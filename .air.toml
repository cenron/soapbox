root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/web ./cmd/web"
  bin = "./tmp/web"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "web", "node_modules", "build"]
  exclude_regex = ["_test\\.go"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
